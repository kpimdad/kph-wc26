name: Set User Role

on:
  workflow_dispatch:
    inputs:
      nickname:
        description: 'Nickname (exact, case-insensitive)'
        required: true
        default: 'Imdad'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install firebase-admin --prefix scripts
      - name: Set isAdmin false
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/set-user-role.js "${{ github.event.inputs.nickname }}"
